<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Password Generator | Secure Tool</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="../../assets/images/logo.svg" type="image/svg+xml">
    <script src="../../assets/js/preloader.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #121212; color: #d6d6d6; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; background: #3b82f6; cursor: pointer; border-radius: 50%; border: 3px solid #121212; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-[#1e1e1f] border border-[#383838] p-8 rounded-[30px] w-full max-w-md shadow-2xl relative overflow-hidden">
            <!-- Security Badge -->
            <div class="absolute top-0 right-0 bg-[#3b82f6]/10 px-4 py-1 rounded-bl-xl border-l border-b border-[#383838]">
                <span class="text-[10px] text-[#3b82f6] font-bold uppercase tracking-widest">AES-Ready</span>
            </div>

            <header class="text-center mb-8">
                <div class="w-16 h-16 bg-[#3b82f6]/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-[#3b82f6]/20">
                    <i class="fas fa-shield-halved text-[#3b82f6] text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Password Generator</h1>
                <p class="text-[10px] text-[#a8a8a8] uppercase tracking-[0.2em] mt-1">Industrial Grade Security</p>
            </header>

            <div class="space-y-6">
                <!-- Result Display -->
                <div class="relative group">
                    <div id="password-display" class="w-full bg-[#121212] p-5 rounded-2xl border border-[#383838] font-mono text-[#3b82f6] text-lg break-all min-h-[64px] flex items-center pr-12 transition-all">
                        ••••••••••••
                    </div>
                    <button id="copy-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#a8a8a8] hover:text-[#3b82f6] transition-colors p-2" title="Copy to Clipboard">
                        <i class="fas fa-copy"></i>
                    </button>
                    <div id="strength-meter" class="mt-2 h-1 w-0 bg-[#3b82f6] rounded-full transition-all duration-500 shadow-[0_0_10px_#3b82f6]"></div>
                </div>

                <!-- Parameters -->
                <div class="space-y-4 bg-[#121212]/50 p-6 rounded-2xl border border-[#383838]">
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-xs uppercase font-bold tracking-widest text-[#a8a8a8]">Password Length</label>
                            <span id="length-val" class="bg-[#3b82f6] text-white text-[10px] font-bold px-3 py-1 rounded-full">16</span>
                        </div>
                        <input type="range" id="length-slider" min="8" max="64" value="16" class="w-full h-1.5 bg-[#383838] rounded-lg appearance-none cursor-pointer accent-[#3b82f6]">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex items-center gap-3 p-3 bg-[#1e1e1f] rounded-xl border border-[#383838] cursor-pointer group hover:border-[#3b82f6]/50 transition-colors">
                            <input type="checkbox" checked id="inc-numbers" class="w-4 h-4 accent-[#3b82f6]">
                            <span class="text-[10px] text-[#d6d6d6] font-bold uppercase tracking-wider">Numbers</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 bg-[#1e1e1f] rounded-xl border border-[#383838] cursor-pointer group hover:border-[#3b82f6]/50 transition-colors">
                            <input type="checkbox" checked id="inc-symbols" class="w-4 h-4 accent-[#3b82f6]">
                            <span class="text-[10px] text-[#d6d6d6] font-bold uppercase tracking-wider">Symbols</span>
                        </label>
                    </div>
                </div>

                <button id="generate-btn" class="w-full bg-[#3b82f6] text-white font-bold py-5 rounded-2xl shadow-xl shadow-[#3b82f6]/10 border-b-4 border-[#1e40af] hover:brightness-110 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-sync-alt" id="sync-icon"></i>
                    <span>Generate Secure Key</span>
                </button>
            </div>
        </div>
    </main>

    <footer class="text-center py-8">
        <p class="text-[10px] text-[#a8a8a8] uppercase tracking-[0.4em] font-bold opacity-30">© 2026 Ahmed Elhag • Mechatronics Systems</p>
    </footer>

    <!-- Professional Watermark (Massive & Centered) -->
    <div class="fixed inset-0 flex items-center justify-center opacity-[0.04] pointer-events-none z-[0] select-none overflow-hidden">
        <img src="../../assets/images/logo.svg" alt="" class="w-[120%] h-[120%] object-contain min-w-[800px] md:min-w-[1200px]">
    </div>
    <script>
        const display = document.getElementById('password-display');
        const slider = document.getElementById('length-slider');
        const lenVal = document.getElementById('length-val');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const strengthMeter = document.getElementById('strength-meter');
        const incNumbers = document.getElementById('inc-numbers');
        const incSymbols = document.getElementById('inc-symbols');
        const syncIcon = document.getElementById('sync-icon');

        const letters = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const numbers = "0123456789";
        const symbols = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        function generate() {
            // Animation for icon
            syncIcon.classList.add('fa-spin');
            setTimeout(() => syncIcon.classList.remove('fa-spin'), 500);

            let charset = letters;
            if(incNumbers.checked) charset += numbers;
            if(incSymbols.checked) charset += symbols;

            let password = "";
            // Using Crypto API for true randomness
            const array = new Uint32Array(slider.value);
            window.crypto.getRandomValues(array);

            for (let i = 0; i < slider.value; i++) {
                password += charset.charAt(array[i] % charset.length);
            }
            
            display.innerText = password;
            updateStrength(password);
        }

        function updateStrength(pwd) {
            let strength = (pwd.length / 64) * 100;
            strengthMeter.style.width = strength + "%";
            
            // Color based on length
            if(pwd.length < 12) strengthMeter.style.backgroundColor = "#ef4444";
            else if(pwd.length < 20) strengthMeter.style.backgroundColor = "#3b82f6";
            else strengthMeter.style.backgroundColor = "#22c55e";
        }

        slider.oninput = () => { lenVal.innerText = slider.value; generate(); };
        generateBtn.onclick = generate;
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(display.innerText);
            const originalIcon = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check text-green-500"></i>';
            display.style.borderColor = "#22c55e";
            setTimeout(() => { 
                copyBtn.innerHTML = originalIcon;
                display.style.borderColor = "#383838";
            }, 2000);
        };

        // Initial launch
        generate();
    </script>
</body>
</html>
